<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise Tracker — Track Your Gains</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080812;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: #4facfe;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      top: -200px; left: -100px;
      z-index: -1;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      color: #00f2fe;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      outline: none;
    }

    input:focus { border-color: #4facfe; }

    .btn {
      padding: 0.75rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #080812;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
    }

    .api-info {
      margin-top: 3rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .api-info h3 { margin-bottom: 1rem; color: #aaa; }
    code { color: #00f2fe; background: rgba(0, 0, 0, 0.4); padding: 2px 6px; border-radius: 4px; }

    footer {
      margin-top: 4rem;
      color: #444;
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Exercise Tracker</h1>
    <p>Manage users and log daily activities</p>
  </header>

  <div class="grid">
    <div class="card">
      <h2>Create User</h2>
      <form action="/api/users" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <button type="submit" class="btn">Create User</button>
      </form>
    </div>

    <div class="card">
      <h2>Add Exercise</h2>
      <form id="exercise-form" method="POST">
        <input type="text" id="uid" name=":_id" placeholder="User ID (_id)" required>
        <input type="text" name="description" placeholder="Description" required>
        <input type="number" name="duration" placeholder="Duration (mins)" required>
        <input type="text" name="date" placeholder="Date (yyyy-mm-dd) [Optional]">
        <button type="submit" class="btn">Add Exercise</button>
      </form>
    </div>
  </div>

  <div class="api-info">
    <h3>API Endpoints</h3>
    <ul>
      <li><code>GET /api/users</code> - List all users</li>
      <li><code>GET /api/users/:_id/logs</code> - Get exercise log for user</li>
      <li><code>GET /api/users/:_id/logs?from=...&to=...&limit=...</code> - Filtered logs</li>
    </ul>
  </div>

  <footer>
    Built as a freeCodeCamp project.
  </footer>
</div>

<script>
  const exerciseForm = document.getElementById('exercise-form');
  exerciseForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const userId = document.getElementById('uid').value;
    exerciseForm.action = `/api/users/${userId}/exercises`;
    exerciseForm.submit();
  });
</script>

</body>
</html>
